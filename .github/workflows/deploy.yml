name: Deploy to cPanel

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies & Build Frontend
      run: |
        cd frontend
        npm ci || npm install
        npm run build
        # Fail deploy early if Vite forgot hashed chunks
        test -f dist/index.html
        test -d dist/assets
        ls dist/assets | grep -E '\.js$' | head

    # Replace assets/ completely so old hashes cannot mix with a new index.html
    - name: Deploy Vite assets (clean slate)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./frontend/dist/assets/
        server-dir: ./assets/
        dangerous-clean-slate: true

    # Upload index.html, .htaccess, favicon — never wipe site root (protects /api, uploads, etc.)
    - name: Deploy frontend shell files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./frontend/dist/
        server-dir: ./
        dangerous-clean-slate: false
        exclude: |
          **/assets/**
          **/.git*
          **/node_modules/**

    - name: Deploy Backend to cPanel ./api/ via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./backend/
        server-dir: ./api/
        exclude: |
          **/.htaccess
          **/node_modules/**
          **/.env
          **/.env.*
          **/uploads/**
